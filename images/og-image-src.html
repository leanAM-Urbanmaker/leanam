<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@font-face{font-family:'Inter';src:url('../fonts/inter-latin.woff2') format('woff2');font-weight:100 900}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/jetbrains-mono-latin.woff2') format('woff2');font-weight:400 600}
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0A1628;font-family:'Inter',sans-serif;color:#F4F8FB;position:relative;overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(111,216,241,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(111,216,241,.05) 1px,transparent 1px);background-size:40px 40px}
.glow{position:absolute;right:-200px;top:-200px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(111,216,241,.14),transparent 65%)}
.wrap{position:relative;padding:80px 90px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:.22em;color:#6FD8F1;font-weight:600}
h1{font-size:74px;font-weight:800;letter-spacing:-.02em;line-height:1.08;max-width:980px}
h1 .accent{color:#6FD8F1;font-style:italic;font-weight:500}
.badges{display:flex;gap:14px}
.badge{font-family:'JetBrains Mono',monospace;font-size:19px;padding:12px 22px;border:1px solid rgba(111,216,241,.35);color:rgba(244,248,251,.85);background:rgba(111,216,241,.07)}
.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.logo{display:flex;align-items:center;gap:14px}
.logo img{height:54px}
.url{font-family:'JetBrains Mono',monospace;font-size:21px;color:rgba(244,248,251,.55);letter-spacing:.06em}
.line{position:absolute;left:0;right:0;bottom:0;height:6px;background:linear-gradient(90deg,#6FD8F1,rgba(111,216,241,.15))}
</style></head>
<body>
<div class="grid"></div><div class="glow"></div>
<div class="wrap">
  <div>
    <div class="eyebrow">// ADDITIVE MANUFACTURING · SOFTWARE · BERATUNG</div>
    <h1 style="margin-top:28px">3D-Druck-Produktion <span class="accent">souverän steuern.</span></h1>
  </div>
  <div class="badges">
    <span class="badge">Made in Germany</span>
    <span class="badge">Datensouverän</span>
    <span class="badge">On-Premise</span>
  </div>
  <div class="bottom">
    <div class="logo"><img src="leanam-logo.png" alt="leanAM"></div>
    <div class="url">leanam.com</div>
  </div>
</div>
<div class="line"></div>
</body></html>
