[build]
  publish = "."

# ── 301 Redirects ──────────────────────────────────────────────────────────────

# /index.html → canonical root
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301
  force  = true

# Old calculator URL → new MES sub-page
[[redirects]]
  from   = "/druckfarm-rechner.html"
  to     = "/mes/druckfarm-rechner.html"
  status = 301

# ── Security & Cache Headers ───────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Long cache for fingerprinted/static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# /wissen and /branchen → clean-URL directory pages
[[redirects]]
  from   = "/wissen"
  to     = "/wissen/"
  status = 301

[[redirects]]
  from   = "/branchen"
  to     = "/wissen/"
  status = 301

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
